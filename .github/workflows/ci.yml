name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Lint · Test · Build · Pack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      # Verify the publishable tarball contents (dist + types + native adapter).
      - run: npm pack --dry-run

  react-native:
    name: React Native bundle (Expo / Metro)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Build the library to dist/ first — Metro consumes the built output.
      - run: npm run build
      - name: Install example app
        working-directory: examples/native
        run: npm ci
      # Headless bundle for iOS: proves Metro resolves the react-native-svg
      # adapter (primitives/index.native.tsx) and every chart. No simulator.
      - name: Bundle for iOS
        working-directory: examples/native
        run: npx expo export --platform ios --output-dir /tmp/expo-out
