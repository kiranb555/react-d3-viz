name: Release

# Publishes to npm with provenance when a v* tag is pushed, e.g.:
#   npm version 1.0.0 && git push --follow-tags
# Requires an NPM_TOKEN repo secret (npmjs.com → Access Tokens → Automation).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # required for npm provenance (OIDC)

jobs:
  publish:
    name: Build · Test · Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
